# yet_essential.prompt_autocomplete settings

# [Search]
# Search algorithm to use.
# Options:
#   fuzzy    - Characters must appear in term in order (e.g. "ag" matches "artist_gen")
#   contains - Term must contain the query string as a substring
#   prefix   - Term must start with the query string (fastest)
# Default: fuzzy
search_algorithm=fuzzy

# Autocomplete CSV filename. The file must be located in config/tag/ folder.
csv_file=booru.csv

# Maximum number of results to return.
# Max: 200
# Default: 20
search_limit=20

# Sort mode for results.
# Options:
#   score    - Rank by match quality (best for fuzzy/contains)
#   alphabet - Rank strictly by name
#   count    - Rank by usage frequency
# Default: score
sort_mode=score

# [Formatting]
# Suffix to append after insertion (e.g. ", ")
# Set to empty for no suffix.
insertion_suffix=", "

# Spacing mode.
# Options:
#   underscore - insert_as_it_is
#   space      - convert_underscores_to_spaces
# Default: space
spacing_mode=space

# Whether to escape parentheses "(" and ")" with backslashes during insertion.
# Useful for standard SD prompt formatting.
# Default: true
escape_parentheses=true

# [UI]
# Whether to show the "cat X" ID in the results (default: false)
show_category_id=false

# Whether to show the post count (e.g. "7,528,518") in the results (default: false)
show_post_count=false
